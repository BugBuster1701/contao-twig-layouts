<!DOCTYPE html>
<html lang='en' class=''>

<head>

  <meta charset='UTF-8'>
  <meta name="generator" content="css-tricks.com using-grid-named-areas-to-visualize-and-reference-your-layout">
  <title>contao-layout-3x3-grid-areas Demo</title>

  <style>

/* Resets */
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Base Style */
body {
  color: white;
  font-family: "Open Sans", sans-serif;
  font-size: 1.5rem;
}

#wrapper > * {
  padding: 1rem;
}

header {
  background-color: #251947;
  border: 4px solid #6f35f1;
}

#left-side {
  background-color: #414819;
  border: 4px solid #859433;
}

main {
  background-color: #461947;
  border: 4px solid #923394;
}

#right-side {
  background-color: #1b4b40;
  border: 4px solid #369680;
}

footer {
  background-color: #251947;
  border: 4px solid #6f35f1;
}

/* Mobile Styles */
#wrapper {
  display: grid;
  grid-template-areas:
    "head"
    "left"
    "main"
    "right"
    "foot";
  min-height: 100vh;
}

#wrapper > header,
footer {
  display: flex;
  align-items: center;
}

header {
  grid-area: head;
}

#left-side {
  grid-area: left;
}

main {
  grid-area: main;
}

#right-side {
  grid-area: right;
}

footer {
  grid-area: foot;
}

/* Tablet styles */
@media screen and (min-width: 500px) {
  #wrapper {
    grid-template-columns: 0.5fr 1fr;
    grid-template-rows: 100px 1fr 1fr 100px;
    grid-template-areas:
      "head head"
      "left main"
      "right main"
      "foot foot";
  }
}

/* laptop and desktop styles */
@media screen and (min-width: 960px) {
  #wrapper {
    grid-template-columns: 200px 1fr 200px;
    grid-template-areas:
      "head head head"
      "left main right"
      "left main right"
      "foot foot foot";
    width: 1024px;
    margin: 0 auto;
  }
}


  </style>

  
</head>

    <body id="wrapper">
        <header>Header</header>
        <main>Main Content</main>
        <aside id="left-side">Left Sidebar</aside>
        <aside id="right-side">Right Sidebar</aside>
        <footer>Footer, Thanks: <a href="https://css-tricks.com/using-grid-named-areas-to-visualize-and-reference-your-layout/"> css-tricks.com</a></footer>
    </body>
</html>
